name: SmartHire AI – CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOCKER_IMAGE: smarthire-ai-backend
  PYTHON_VERSION: "3.11"
  NODE_VERSION: "20"

jobs:
  # ─── Job 1: Lint Python Backend ──────────────────────────────────────────────
  lint-backend:
    name: Lint Python (flake8)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 flake8-bugbear flake8-docstrings

      - name: Run flake8
        run: |
          flake8 app.py \
            --max-line-length=120 \
            --extend-ignore=E501,D100,D104,D205,D400 \
            --count \
            --statistics

  # ─── Job 2: Build Frontend ───────────────────────────────────────────────────
  build-frontend:
    name: Build React Frontend (Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: frontend/package.json

      - name: Install npm dependencies
        run: npm install

      - name: Build production bundle
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/
          retention-days: 7

  # ─── Job 3: Build Docker Image ───────────────────────────────────────────────
  build-docker:
    name: Build Backend Docker Image
    runs-on: ubuntu-latest
    needs: lint-backend   # only build if linting passes

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push on PR)
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Export image as tar for inspection
        run: |
          docker save ${{ env.DOCKER_IMAGE }}:latest | gzip > smarthire-backend.tar.gz

      - name: Upload Docker tar artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: smarthire-backend.tar.gz
          retention-days: 3

  # ─── Job 4: Integration Summary ──────────────────────────────────────────────
  ci-summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [lint-backend, build-frontend, build-docker]
    if: always()

    steps:
      - name: Report pipeline status
        run: |
          echo "================================================"
          echo "  SmartHire AI – CI Pipeline Summary"
          echo "------------------------------------------------"
          echo "  Lint Backend   : ${{ needs.lint-backend.result }}"
          echo "  Build Frontend : ${{ needs.build-frontend.result }}"
          echo "  Build Docker   : ${{ needs.build-docker.result }}"
          echo "  Commit SHA     : ${{ github.sha }}"
          echo "  Triggered by   : ${{ github.actor }}"
          echo "================================================"
